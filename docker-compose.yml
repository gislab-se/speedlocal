name: speedlocal-runtime

services:
  postgres:
    image: ${POSTGIS_IMAGE:-postgis/postgis:16-3.4}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speedlocal}
      POSTGRES_USER: ${POSTGRES_USER:-speedlocal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-speedlocal_local_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_HOST:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
